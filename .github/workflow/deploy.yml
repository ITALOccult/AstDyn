name: Deploy su IONOS via SFTP

on:
  push:
    branches:
      - main  # Cambia in master se il tuo ramo principale si chiama così

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Scarica il codice
      uses: actions/checkout@v4

    - name: Carica file tramite SFTP
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: ${{ secrets.FTP_USERNAME }}
        server: ${{ secrets.FTP_SERVER }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        local_path: './*'
        remote_path: '/Develop/AstDyn/'
        sftp_only: true
