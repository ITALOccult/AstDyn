name: Deploy su IONOS dopo il Push

on:
  push:
    branches:
      - main  # Cambia in master se il tuo ramo principale si chiama così

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Scarica il codice dalla repository
      uses: actions/checkout@v4

    - name: Carica i file su IONOS tramite SFTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22 # Usa 21 se utilizzi FTP classico invece di SFTP
        local-dir: ./
        server-dir: ./Develop/AstDyn/
